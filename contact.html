<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Обратная связь</title>

    <link rel="stylesheet" href="style.css">

    <style>
        h2 {
            color: purple;
        }
    </style>
</head>
<body>

<header>
    <h1 style="color: red;">Обратная связь</h1>
</header>

<nav>
    <a href="index.html">Главная</a>
    <a href="contact.html">Обратная связь</a>
</nav>

<main>
    <section class="card">
        <h2>Связаться со мной</h2>

        <form>
            <label>Имя:</label><br>
            <input type="text" name="name"><br><br>

            <label>Email:</label><br>
            <input type="email" name="email"><br><br>

            <label>Пароль:</label><br>
            <input type="password" name="password"><br><br>

            <label>Ваш курс:</label><br>
            <select name="course">
                <option>1 курс</option>
                <option>2 курс</option>
                <option>3 курс</option>
                <option>4 курс</option>
            </select><br><br>

            <label>Сообщение:</label><br>
            <textarea name="message"></textarea><br><br>

            <label>
                <input type="checkbox"> Согласен с условиями
            </label><br><br>

            <button type="submit">Отправить</button>
        </form>
    </section>
</main>

<footer id="footer">
    <p>&copy; 2026 Студент ВШЭ</p>
</footer>

</body>
</html>
